services:
  db:
    image: postgres:16-alpine
    hostname: db
    environment:
      POSTGRES_DB: sequence_bench
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    hostname: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    pull_policy: build
    environment:
      DATABASE_CONNECTION_STRING: postgresql+asyncpg://${DB_USER:-user}:${DB_PASSWORD:-pass}@db:5432/sequence_bench
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      GRADIENT_STORAGE_DIR: /app/storage/gradients
      UPLOAD_STORAGE_DIR: /app/storage/uploads
      CHECKPOINT_DIR: /app/storage/checkpoints
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
    volumes:
      - app_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=1
    pull_policy: build
    environment:
      DATABASE_CONNECTION_STRING: postgresql+asyncpg://${DB_USER:-user}:${DB_PASSWORD:-pass}@db:5432/sequence_bench
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      GRADIENT_STORAGE_DIR: /app/storage/gradients
      UPLOAD_STORAGE_DIR: /app/storage/uploads
      CHECKPOINT_DIR: /app/storage/checkpoints
    volumes:
      - app_storage:/app/storage
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    pull_policy: build
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  app_storage:
